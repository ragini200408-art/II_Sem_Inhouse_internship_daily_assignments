<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live User Directory</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .user-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .user-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
    }
    .avatar {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #0d6efd;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <!-- Header Area -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center border-bottom pb-3 mb-4 gap-3">
      <div>
        <h1 class="fw-bold text-dark mb-1"><i class="fa-solid fa-users text-primary me-2"></i>Live User Directory</h1>
        <p class="text-muted mb-0">Real-time member roster and connections</p>
      </div>
      <!-- User Count Badge (Bonus) -->
      <div>
        <span class="fs-5 badge bg-primary px-3 py-2 rounded-pill shadow-sm">
          Total Users: <span id="userCount">0</span>
        </span>
      </div>
    </div>

    <!-- Controls (Bonus Search & Sort) -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
          <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search users by name...">
        </div>
      </div>
      <div class="col-md-6 d-flex justify-content-md-end">
        <div class="input-group shadow-sm style-select style-sort" style="max-width: 250px;">
          <span class="input-group-text bg-white"><i class="fa-solid fa-arrow-down-a-z text-muted"></i></span>
          <select id="sortSelect" class="form-select">
            <option value="asc">Sort: A to Z</option>
            <option value="desc">Sort: Z to A</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Loading State (Required) -->
    <div id="loadingState" class="text-center my-5">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 text-muted fw-semibold">Fetching directory data...</p>
    </div>

    <!-- Error State Container (Required / Bonus Retry) -->
    <div id="errorState" class="alert alert-danger d-none text-center p-5 shadow-sm rounded-3" role="alert">
      <i class="fa-solid fa-triangle-exclamation fa-3x mb-3 text-danger"></i>
      <h4 class="alert-heading fw-bold">Oops! Something went wrong</h4>
      <p id="errorMessage" class="mb-4">We couldn't retrieve the user data at this time.</p>
      <button id="retryButton" class="btn btn-danger px-4 rounded-pill"><i class="fa-solid fa-rotate-right me-2"></i>Retry Now</button>
    </div>

    <!-- Bootstrap Card Grid Layout (Required) -->
    <div id="userGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 d-none">
      <!-- Dynamic User Cards Inserted Here -->
    </div>
  </div>

  <!-- App Logic script -->
  <script>
    // Config: Utilizing standard JSONPlaceholder API for clean placeholder data
    const API_URL = 'https://jsonplaceholder.typicode.com/users';
    
    // DOM Elements
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const errorMessage = document.getElementById('errorMessage');
    const retryButton = document.getElementById('retryButton');
    const userGrid = document.getElementById('userGrid');
    const userCount = document.getElementById('userCount');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');

    let localUsersArray = [];

    // Fetch from Users API with complete error handling
    function fetchUsers() {
      // Reset UI States
      loadingState.classList.remove('d-none');
      errorState.classList.add('d-none');
      userGrid.classList.add('d-none');

      fetch(API_URL)
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP network error! Status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          // Normalize names and append random high-quality avatars for custom styling polish
          localUsersArray = data.map((user, idx) => ({
            id: user.id,
            name: user.name,
            email: user.email.toLowerCase(),
            company: user.company.name,
            city: user.address.city,
            avatar: `https://i.pravatar.cc/150?img=${(idx + 15)}`
          }));
          
          loadingState.classList.add('d-none');
          userGrid.classList.remove('d-none');
          
          processAndRender();
        })
        .catch(error => {
          // Error Handling with .catch() (Required)
          console.error("Directory fetch crash:", error);
          loadingState.classList.add('d-none');
          errorMessage.innerText = `Failed to connect: ${error.message || 'Unknown network error.'}`;
          errorState.classList.remove('d-none');
        });
    }

    // Process filters, sorting, updates count, and injects cards into responsive Bootstrap layout
    function processAndRender() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const sortOrder = sortSelect.value;

      // Filter by name (Bonus Live Search)
      let displayedUsers = localUsersArray.filter(user => 
        user.name.toLowerCase().includes(searchTerm)
      );

      // Alphabetical sorting (Bonus Sort)
      displayedUsers.sort((a, b) => {
        return sortOrder === 'asc' 
          ? a.name.localeCompare(b.name) 
          : b.name.localeCompare(a.name);
      });

      // Update badge (Bonus User Count)
      userCount.innerText = displayedUsers.length;

      // Clear dynamic grid contents
      userGrid.innerHTML = '';

      if (displayedUsers.length === 0) {
        userGrid.innerHTML = `
          <div class="col-12 text-center py-5">
            <p class="text-muted fs-5"><i class="fa-regular fa-face-frown me-2"></i>No matching users found matching your criteria.</p>
          </div>
        `;
        return;
      }

      // Generate fully responsive bootstrap columns & grid layouts
      displayedUsers.forEach(user => {
        const userCardHTML = `
          <div class="col">
            <div class="card h-100 border-0 shadow-sm rounded-3 user-card text-center p-3">
              <div class="card-body d-flex flex-column align-items-center">
                <img src="${user.avatar}" alt="${user.name}" class="avatar mb-3" onerror="this.src='https://via.placeholder.com/150'">
                <h5 class="card-title fw-bold text-dark mb-1 text-truncate w-100">${user.name}</h5>
                <p class="card-text text-primary small fw-semibold mb-3 text-truncate w-100">@${user.company}</p>
                
                <div class="w-100 border-top pt-3 mt-auto text-start text-muted small">
                  <div class="text-truncate mb-1"><i class="fa-regular fa-envelope me-2 text-secondary"></i>${user.email}</div>
                  <div class="text-truncate"><i class="fa-solid fa-location-dot me-2 text-secondary"></i>${user.city}</div>
                </div>
              </div>
            </div>
          </div>
        `;
        userGrid.insertAdjacentHTML('beforeend', userCardHTML);
      });
    }

    // Event Listeners
    searchInput.addEventListener('input', processAndRender);
    sortSelect.addEventListener('change', processAndRender);
    retryButton.addEventListener('click', fetchUsers); // Retry button behavior (Bonus)

    // Initial Kickoff
    document.addEventListener('DOMContentLoaded', fetchUsers);
  </script>
</body>
</html>
