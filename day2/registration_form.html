<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body style="background-color:#e6f4ff; font-family:Arial, sans-serif;">
<center>
<div style="width:500px; background:white; border:2px solid #1a73e8; border-radius:12px; padding:30px; margin-top:50px; box-shadow:0px 5px 15px rgba(0,0,0,0.2);">

<h2 style="color:#1a73e8; text-align:center; margin-bottom:25px;">
    College Registration Form
</h2>

<form>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Name:</label>
    <input type="text" placeholder="Name" style="width:150px; padding:6px; margin-right:10px;">
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Email:</label>
    <input type="email" style="width:320px; padding:6px;">
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Date of Birth:</label>
    <input type="date" style="width:320px; padding:6px;">
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Phone:</label>
    <input type="tel" style="width:320px; padding:6px;">
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px;">Course:</label>
    <select style="width:334px; padding:6px;">
        <option>--Select Course--</option>
        <option>B.Tech</option>
        <option>B.Sc</option>
        <option>B.Com</option>
        <option>B.A</option>
    </select>
</div>


<div style="margin-bottom:18px;">
    <label style="display:inline-block; width:140px; vertical-align:top;">Address:</label>
    <textarea rows="3" style="width:320px; padding:6px;"></textarea>
</div>


<div style="margin-bottom:20px;">
    <label style="display:inline-block; width:140px;">Country:</label>
    <select style="width:334px; padding:6px;">
        <option>--Select Country--</option>
        <option>India</option>
        <option>USA</option>
        <option>Canada</option>
        <option>Australia</option>
    </select>
</div>

<!-- TERMS -->
<div style="margin-bottom:25px;">
    <label style="display:inline-block; width:140px;"></label>
    <input type="checkbox"> I agree to Terms & Conditions
</div>

<!-- BUTTONS -->
<div style="text-align:center;">
    <input type="submit" value="Register"
        style="padding:8px 20px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer;">

    <input type="reset" value="Clear"
        style="padding:8px 20px; margin-left:10px; border-radius:5px; border:1px solid #ccc;">
</div>
</form>
</div>
</center>
</body>
</html>
